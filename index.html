<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Cardtoon</title>
    <style>
        html, body { touch-action: none; -webkit-text-size-adjust: none; overflow: hidden; }
        body { margin: 0; background-image: url('./image_6.png'); background-size: 80%; background-repeat: no-repeat; background-attachment: fixed; background-color: rgba(0, 0, 0, 0.4); background-blend-mode: multiply; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #fff; background-position: -50% center; }
        
        #magic-setup { margin-top: 100px; opacity: 0; }
        body.started #magic-setup { animation: easelUp 2s cubic-bezier(0.25, 1, 0.5, 1) 1.5s forwards; }
        @keyframes easelUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        #status-text { text-align: center; margin-bottom: 20px; color: #f3c623; font-size: 22px; font-weight: bold; height: 30px; }

        #magic-stage { position: relative; width: 360px; height: 440px; background: #fafafa; border-radius: 6px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #paintCanvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: crosshair; }
        
        #magic-card-3d { position: absolute; z-index: 20; width: 100%; height: 100%; transform-style: preserve-3d; display: none; transition: transform 1s ease-in-out; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: white; border-radius: 10px; }
        .card-front { transform: rotateY(180deg); }
        .card-img { width: 100%; height: 100%; object-fit: contain; }

        #action-buttons { margin-top: 35px; display: flex; gap: 20px; }
        .action-btn { padding: 12px 30px; font-size: 18px; border-radius: 8px; border: none; background: #f3c623; color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-overlay" style="position:fixed; width:100%; height:100%; background:#000; z-index:999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <div style="font-size:32px; color:#f3c623; margin-bottom:10px;">Draw a Magician</div>
        <div style="color:#888;">Tap to Start</div>
    </div>

    <div id="magic-setup">
        <h3 id="status-text">Please draw a magician</h3>
        <div id="magic-stage">
            <canvas id="paintCanvas" width="360" height="440"></canvas>
            <div id="magic-card-3d">
                <div class="card-face card-back"><img class="card-img" src="./cards/bicycle_blue.png"></div>
                <div class="card-face card-front"><img id="img-front" class="card-img" src=""></div>
            </div>
        </div>
        <div id="action-buttons">
            <button id="btn-clear" class="action-btn">Clear</button>
            <button id="btn-next" class="action-btn">Next</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const card3D = document.getElementById('magic-card-3d');
        let magicState = -1, isDrawing = false, tracePoints = [];

        document.getElementById('start-overlay').addEventListener('touchstart', (e) => {
            document.body.classList.add('started');
            e.target.style.display = 'none';
        });

        // 設定日期對應卡片
        const d = new Date();
        document.getElementById('img-front').src = `./cards/spade_${(d.getDate()%13)+1}.png`;

        canvas.addEventListener('pointerdown', (e) => {
            if(magicState > 0 && magicState < 4) return;
            isDrawing = true;
            ctx.beginPath();
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const r = canvas.getBoundingClientRect();
            const x = e.clientX - r.left, y = e.clientY - r.top;
            if(magicState === 0) tracePoints.push({x,y});
            ctx.lineTo(x, y); ctx.stroke();
        });

        window.addEventListener('pointerup', () => { 
            isDrawing = false;
            if (magicState === 0 && tracePoints.length > 20) {
                magicState = 1;
                statusText.innerText = "Tap to cast the spell...";
            }
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            magicState = 0;
            statusText.innerText = "Draw a frame of card";
            document.getElementById('action-buttons').style.display = 'none';
        });

        document.getElementById('magic-stage').addEventListener('click', () => {
            if (magicState === 1) {
                magicState = 3;
                card3D.style.display = 'block';
                statusText.innerText = "Revealing...";
                setTimeout(() => {
                    card3D.style.transform = "rotateY(180deg)";
                    magicState = 4;
                    setTimeout(() => statusText.innerText = "Magic complete!", 1000);
                }, 1000);
            }
        });

        document.getElementById('btn-clear').addEventListener('click', () => ctx.clearRect(0,0,360,440));
    </script>
</body>
</html>
