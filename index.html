<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Cardtoon - Magic Card</title>
    <style>
        /* 🔒 Base Protection */
        html, body { touch-action: none; -webkit-text-size-adjust: none; overflow: hidden; background-color: #000; }
        
        body { 
            margin: 0; background-image: url('./image_6.png'); background-size: 80%;
            background-repeat: no-repeat; background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.35); background-blend-mode: multiply;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            min-height: 100vh; font-family: sans-serif; color: #fff;
            user-select: none; -webkit-user-select: none; overscroll-behavior: none;
            background-position: -50% center; 
        }

        body.started { animation: stickmanEnter 3.0s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes stickmanEnter { from { background-position: -50% center; } to { background-position: 25% center; } }
        
        /* 🛠 修正動畫縮放覆蓋問題，利用 --scale-factor 保持比例 */
        #magic-setup { 
            --scale-factor: 1;
            display: flex; flex-direction: column; align-items: center; 
            margin-top: 100px; opacity: 0; transform-origin: top center;
        }
        body.started #magic-setup { animation: easelUp 2.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) 1.8s forwards; }
        @keyframes easelUp { 
            from { transform: translateY(-50px) scale(var(--scale-factor)); opacity: 0; } 
            to { transform: translateY(0) scale(var(--scale-factor)); opacity: 1; } 
        }
        
        #status-text { text-align: center; margin: 0 0 20px 0; color: #f3c623; font-size: 20px; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,0.9); width: 320px; line-height: 1.5; opacity: 0; }
        body.started #status-text { animation: fadeInText 0.5s ease 3.8s forwards; }
        @keyframes fadeInText { to { opacity: 1; } }

        @media (max-width: 500px) and (orientation: portrait) {
            body { background-size: 110%; }
            #magic-setup { margin-top: 80px; --scale-factor: 0.85; } /* 修正手機版的頂部距離與比例 */
            #status-text { width: 340px; font-size: 22px; margin-bottom: 20px; }
        }

        #start-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; z-index: 9999; cursor: crosshair; transition: opacity 0.6s ease-in-out; touch-action: none; text-align: center; }
        
        /* 🎨 極淡花色標記 (接近隱形) */
        .suit-quadrant { display: flex; justify-content: center; align-items: center; font-size: 100px; opacity: 0.03; pointer-events: none; -webkit-touch-callout: none; color: #fff; }
        .quad-tl { border-right: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .quad-tr { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .quad-bl { border-right: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* 🔄 旋轉起始方框 */
        #start-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; height: 250px; background: transparent; border: 2px solid rgba(255, 255, 255, 0.15); display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; pointer-events: auto; }
        #swipe-hint { color: rgba(255, 255, 255, 0.6); font-size: 24px; font-weight: bold; margin-bottom: 15px; animation: textPulse 1.5s infinite alternate; }
        
        /* 🃏 即時卡片選擇顯示 */
        #result-display { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; justify-content: center; align-items: center; background: transparent; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; pointer-events: none; z-index: 10000; }
        #result-suit { font-size: 150px; line-height: 1; }
        #result-value { font-size: 60px; font-weight: bold; color: #fff; margin-top: -10px; }
        #result-display.show { opacity: 1; visibility: visible; }
        #result-display.fading { animation: fadeOutResult 0.5s ease-out 2s forwards; }
        @keyframes fadeOutResult { to { opacity: 0; visibility: hidden; } }

        .pulse-hint { animation: textPulse 1.5s infinite alternate; }
        @keyframes textPulse { from { text-shadow: 0 2px 8px rgba(243, 198, 35, 0.3); transform: scale(0.98); } to { text-shadow: 0 2px 25px rgba(243, 198, 35, 1); color: #fff; transform: scale(1.02); } }

        #magic-stage-wrapper { position: relative; }
        #magic-stage { position: relative; width: 360px; height: 440px; background: #fafafa; border-radius: 6px; box-shadow: 0 30px 70px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.02); border: 1px solid #e0e0e0; perspective: 1500px; z-index: 3; }
        
        #magic-stage-wrapper::after { content: ""; position: absolute; bottom: -8px; left: -20px; width: 400px; height: 16px; background: #8C5323; border-radius: 4px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); z-index: 4; border-bottom: 3px solid #592E0F; }

        #paintCanvas { position: absolute; top: 0; left: 0; z-index: 20; background: transparent; cursor: crosshair; touch-action: none; }
        #magic-stage-wrapper.ready-to-click { cursor: pointer; }
        
        #magic-card-3d { position: absolute; z-index: 30; transform-style: preserve-3d; display: none; transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: center center; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }
        .card-back { z-index: 2; }
        .card-front { z-index: 1; transform: rotateY(180deg); }
        
        .clip-container { width: 100%; height: 100%; overflow: hidden; background: #fafafa; border-radius: 10px; opacity: 0; transition: opacity 3.0s ease-in-out; }
        .clip-container.reveal { opacity: 1; }
        
        .frame-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        .card-img { width: 100%; height: 100%; object-fit: fill; mix-blend-mode: multiply; filter: contrast(1.05) brightness(1.0); transform: scale(0.8); transform-origin: center center; }

        /* 🛠 穩定的按鈕容器 */
        #button-wrapper { margin-top: 35px; display: flex; justify-content: center; align-items: center; min-height: 50px; z-index: 10; opacity: 0; }
        body.started #button-wrapper { animation: fadeInText 0.5s ease 3.8s forwards; }
        #action-buttons { display: flex; gap: 30px; }
        
        .action-btn { padding: 12px 28px; font-size: 20px; border-radius: 8px; border: 2px solid #8C5323; background: #fafafa; color: #592E0F; cursor: pointer; font-weight: bold; box-shadow: 0 6px 12px rgba(0,0,0,0.6); transition: transform 0.1s; font-family: sans-serif; }
        .action-btn.primary { background: #f3c623; border-color: #d4a700; color: #111; }
        .action-btn:active { transform: scale(0.95); }

        #btn-again { display: none; background: #f3c623; border-color: #d4a700; color: #111; }
        
        /* 移除右下角秘密區域的 trigger */
    </style>
</head>
<body>

    <div id="start-overlay">
        <div class="suit-quadrant quad-tl">♣</div>
        <div class="suit-quadrant quad-tr">♦</div>
        <div class="suit-quadrant quad-bl">♠</div>
        <div class="suit-quadrant quad-br">♥</div>
        
        <div id="start-box">
            <div id="swipe-hint">swipe to start</div>
            </div>
        
        <div id="result-display">
            <div id="result-suit"></div>
            <div id="result-value"></div>
        </div>
    </div>

    <div id="magic-setup">
        <h3 id="status-text">✏️ Please draw a magician</h3>
        <div id="magic-stage-wrapper">
            <div id="magic-stage">
                <canvas id="paintCanvas" width="360" height="440"></canvas>
                <div id="magic-card-3d">
                    <div class="card-face card-back"><div class="clip-container"><img class="card-img" src="./cards/bicycle_blue.png" alt="back"></div><canvas class="frame-canvas"></canvas></div>
                    <div class="card-face card-front"><div class="clip-container"><img id="img-front" class="card-img" src="" alt="front"></div><canvas class="frame-canvas"></canvas></div>
                </div>
            </div>
        </div>
        <div id="button-wrapper">
            <div id="action-buttons">
                <button id="btn-clear" class="action-btn">Clear</button>
                <button id="btn-next" class="action-btn primary">Next</button>
            </div>
            <button id="btn-again" class="action-btn primary">Try Again</button>
        </div>
    </div>

    <script>
        document.addEventListener('touchstart', (e) => { 
            if (e.touches.length > 1) e.preventDefault(); 
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const nowTime = Date.now();
            if (nowTime - lastTouchEnd <= 300) {
                if (event.target.id !== 'paintCanvas' && !event.target.classList.contains('action-btn')) {
                    event.preventDefault(); 
                }
            }
            lastTouchEnd = nowTime;
        }, { passive: false });
        
        // 🔮 依據指定規則排列的花色陣列：紅心 -> 黑桃 -> 方塊 -> 梅花
        const suitOrder = ["heart", "spade", "diamond", "club"];
        
        // --- 核心互動邏輯變數 ---
        let currentSuit = ""; 
        let currentValString = ""; 
        
        const imgFront = document.getElementById('img-front');
        const startOverlay = document.getElementById('start-overlay');
        const startBox = document.getElementById('start-box');
        const resultDisplay = document.getElementById('result-display');
        const resultSuit = document.getElementById('result-suit');
        const resultValue = document.getElementById('result-value');
        
        // 輔助函式：將字串或數字轉成檔案名稱所需格式
        function getCardValueName(val) {
            if (val === 1 || val === '1') return '1';
            if (val === 11 || val === 'jack') return 'jack';
            if (val === 12 || val === 'queen') return 'queen';
            if (val === 13 || val === 'king') return 'king';
            return val.toString();
        }
        
        // 輔助函式：將目前的數值名稱轉成純數字方便加算
        function getCardValueNumber(valName) {
            if (valName === 'jack') return 11;
            if (valName === 'queen') return 12;
            if (valName === 'king') return 13;
            return parseInt(valName, 10);
        }

        // 輔助函式：將純數字轉為顯示用的 A, J, Q, K
        function getDisplayedValue(num) {
            if (num === 1) return 'A';
            if (num === 11) return 'J';
            if (num === 12) return 'Q';
            if (num === 13) return 'K';
            return num.toString();
        }
        
        // 輔助函式：獲取花色符號
        function getSuitSymbol(suit) {
            if (suit === 'heart') return '♥';
            if (suit === 'spade') return '♠';
            if (suit === 'diamond') return '♦';
            if (suit === 'club') return '♣';
            return '';
        }

        // 輔助函式：更新中央即時顯示
        let resultTimer = null;
        function showResultImmediate(suit, valueNum, isK = false) {
            clearTimeout(resultTimer); // 清除舊倒數
            resultDisplay.classList.remove('fading'); // 移除淡出class
            
            resultSuit.innerText = getSuitSymbol(suit);
            resultSuit.style.color = (suit === 'heart' || suit === 'diamond') ? '#ff3b30' : '#fff';
            resultValue.innerText = isK ? 'K' : getDisplayedValue(valueNum);
            resultDisplay.classList.add('show'); // 顯示
            
            // 2 秒後啟動淡出倒數
            resultDisplay.classList.add('fading');
            resultTimer = setTimeout(() => {
                resultDisplay.classList.remove('show', 'fading');
            }, 2500); // 包含動畫時間
        }
        
        function syncFrontImage() {
            imgFront.src = `./cards/${currentSuit}_${getCardValueName(currentValString)}.png`; 
        }
        
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const btnClear = document.getElementById('btn-clear');
        const btnNext = document.getElementById('btn-next');
        const btnAgain = document.getElementById('btn-again');
        const actionButtons = document.getElementById('action-buttons');
        const card3D = document.getElementById('magic-card-3d');
        const stageWrapper = document.getElementById('magic-stage-wrapper');

        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        // --- 起始畫面旋轉互動與卡片選擇核心 ---
        
        let initialSwipeStartX = null;
        let initialSwipeStartY = null;
        let cumulativeRotation = 0; // 累計旋轉角度
        const MIN_ROTATION_FOR_START = 60; // 觸發啟動所需的最小旋轉角度
        
        let secretInputActive = false;
        let secretClockPivotX = null;
        let secretClockPivotY = null;
        let secretLongPressTimer = null;
        let secretLastTapTime = 0;
        
        // 象限偵測
        function getQuadrantSuit(x, y, w, h) {
            if (x < w / 2) {
                return (y < h / 2) ? 'club' : 'spade'; // 左上, 左下
            } else {
                return (y < h / 2) ? 'diamond' : 'heart'; // 右上, 右下
            }
        }
        
        // atan2 角度轉時鐘 Hour Index (0-11, 0為12點Q)
        function getClockHourIndex(pivotX, pivotY, currX, currY) {
            const dX = currX - pivotX;
            const dY = currY - pivotY;
            // atan2 給出相對於正X軸的弧度。Y正值為下。
            // 轉為角度 [0, 360), 從 12 點鐘順時針
            let angle = (Math.atan2(dY, dX) * 180 / Math.PI + 90 + 360) % 360;
            
            // 將角度映射至 12 個 30 度區間 (index 0 為 12點鐘)
            // 為了將 30度區間置中，加 15 度修正
            let index = Math.floor(((angle + 15) % 360) / 30);
            return index; 
        }

        startOverlay.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            const rect = startOverlay.getBoundingClientRect();
            const winW = rect.width;
            const winH = rect.height;
            const pointerX = e.clientX;
            const pointerY = e.clientY;
            
            // 優先檢查是否在旋轉方框上
            if (e.target.id === 'start-box' || e.target.id === 'swipe-hint') {
                initialSwipeStartX = pointerX;
                initialSwipeStartY = pointerY;
                return; // 不觸發秘密輸入
            }
            
            // 祕密輸入邏輯開始
            secretInputActive = true;
            secretClockPivotX = pointerX;
            secretClockPivotY = pointerY;
            
            // 雙擊偵測 (K)
            const currentTime = Date.now();
            const tapSuit = getQuadrantSuit(pointerX, pointerY, winW, winH);
            if (currentTime - secretLastTapTime < 300) {
                // 雙擊判定 K
                currentSuit = tapSuit;
                currentValString = 'king';
                syncFrontImage(); // 更新卡片
                showResultImmediate(currentSuit, 13, true); // 即時顯示
                if (navigator.vibrate) navigator.vibrate([10, 10]); // 震動
                secretInputActive = false; // 結束 drag 邏輯
                clearTimeout(secretLongPressTimer); // 清除長按 timer
            } else {
                // 單擊開始長按 timer
                clearTimeout(secretLongPressTimer); // 防呆
                secretLongPressTimer = setTimeout(() => {
                    // 長按達 300ms 觸發
                    currentSuit = tapSuit;
                    currentValString = '1'; // 預設 A
                    syncFrontImage(); // 更新卡片
                    showResultImmediate(currentSuit, 1); // 即時顯示 default A
                    if (navigator.vibrate) navigator.vibrate(20); // 震動
                    // drag 邏輯將由 pointermove 接管
                }, 300);
            }
            secretLastTapTime = currentTime;
            
        }, { passive: false });

        window.addEventListener('pointermove', (e) => {
            const pointerX = e.clientX;
            const pointerY = e.clientY;

            // 處理旋轉方框滑動啟動
            if (initialSwipeStartX !== null) {
                const rect = startOverlay.getBoundingClientRect();
                const dX = pointerX - initialSwipeStartX;
                const dY = pointerY - initialSwipeStartY;
                
                // 計算相對於螢幕中心的 delta 角度
                const centerW = rect.width / 2;
                const centerH = rect.height / 2;
                
                // 計算 startAngle
                const startAngle = (Math.atan2(initialSwipeStartY - centerH, initialSwipeStartX - centerW) * 180 / Math.PI + 360) % 360;
                // 計算 currentAngle
                const currentAngle = (Math.atan2(pointerY - centerH, pointerX - centerW) * 180 / Math.PI + 360) % 360;
                
                // 計算角度差
                let deltaAngle = currentAngle - startAngle;
                // 處理角度跨越 0/360 的情況
                if (deltaAngle > 180) deltaAngle -= 360;
                if (deltaAngle < -180) deltaAngle += 360;
                
                cumulativeRotation += deltaAngle;
                
                // 套用旋轉至方框 CSS
                startBox.style.transform = `translate(-50%, -50%) rotate(${cumulativeRotation}deg)`;
                
                // 更新 start 點為當前點，達成順滑旋轉
                initialSwipeStartX = pointerX;
                initialSwipeStartY = pointerY;
                
                // 檢查是否足夠旋轉以啟動
                if (Math.abs(cumulativeRotation) > MIN_ROTATION_FOR_START) {
                    // 觸發啟動
                    startOverlay.style.opacity = '0';
                    setTimeout(() => { startOverlay.style.display = 'none'; }, 600);
                    document.body.classList.add('started');
                    initialSwipeStartX = null; // 重置防止多次觸發
                    cumulativeRotation = 0; // 重置
                }
                return; // 不執行秘密輸入邏輯
            }
            
            // 處理秘密卡片輸入 (長按後滑動)
            if (secretInputActive && !secretModal.classList.contains('show')) {
                // 如果長按 timer 還在，且手指有滑動，清除長按 timer 視為普通滑動 (可能想執行別的功能)
                const dragDist = Math.sqrt(Math.pow(pointerX - secretClockPivotX, 2) + Math.pow(pointerY - secretClockPivotY, 2));
                if (dragDist > 10 && secretLongPressTimer !== null) {
                   // 清除長按以允許普通滑動 (例如 Rotary swipe) 不過Rotary有自己target判斷
                   // 所以這裡不清，維持原意：長按300ms+滑動 = 時鐘輸入
                }

                // 如果 currentSuit 已設定 (表示長按 timer 達300ms已觸發)
                if (currentSuit !== "" && currentValString !== "" && currentValueString !== 'king') {
                    // 計算時鐘角度 Hour Index
                    const hourIdx = getClockHourIndex(secretClockPivotX, secretClockPivotY, pointerX, pointerY);
                    
                    // 映射 Hour Index (0為12點Q, 其他為時鐘點數)
                    let hourValue;
                    if (hourIdx === 0) {
                        hourValue = 12; // 12點 Q
                    } else {
                        hourValue = hourIdx; // 1點A, 2點2...
                    }
                    
                    currentValString = hourValue.toString();
                    syncFrontImage(); // 更新卡片
                    showResultImmediate(currentSuit, hourValue); // 即時顯示
                }
            }
            
        }, { passive: false });

        window.addEventListener('pointerup', () => {
            // 重置旋轉方框互動
            initialSwipeStartX = null;
            cumulativeRotation = 0;
            startBox.style.transform = 'translate(-50%, -50%) rotate(0deg)'; // 復原外觀

            // 重置秘密卡片輸入
            secretInputActive = false;
            clearTimeout(secretLongPressTimer); // 防止手指過快放開仍觸發
            
        }, { passive: false });

        window.addEventListener('pointerleave', () => {
            // 重置所有互動狀態
            initialSwipeStartX = null;
            secretInputActive = false;
            clearTimeout(secretLongPressTimer);
        });
        
        // (省略原本與 Started 狀態轉換無關的邏輯，將其加到旋轉起始方框觸發中)

        // 🛠 修正 Started 狀態轉換邏輯：原 overlay click 事件移至 Rotary start box 完成判定中

        // (省略與 Started 狀態轉換無關的邏輯：例如 getCardValueName, syncFrontImage, canvas 事件等)
        
        // 🛠 移除原本的 Started overlay click 事件監聽
        // startOverlay.removeEventListener('touchstart', startOverlayStartFunc); // 不需要此功能

        // canvas 事件與 SortedCorners 邏輯保持原樣
        // (省略 pointerdown, pointermove, pointerup 事件和SortedCorners邏輯)

        // 🛠 修正 stageWrapper click 事件中表演結束 Try Again 邏輯
        stageWrapper.addEventListener('click', (e) => {
            e.stopPropagation();

            if (magicState === 1) {
                // (原本狀態 1 魔法生成邏輯不變)
                // ... (SortedCorners, clip containers path, canvas draws, 瞬間顯示, reveal timers)
                
                magicState = 3; // 先設為過渡狀態
                
                // (省略狀態 1 生成邏輯詳細細節，請保留原代碼)
                // 原原本的狀態 1 魔法生成細節
                magicState = 3; 
                statusText.classList.remove('pulse-hint');
                stageWrapper.classList.remove('ready-to-click'); 
                statusText.innerText = "⏳ Infusing magic into your drawing...";

                const corners = getSortedCorners(tracePoints);
                let allXs = tracePoints.map(p => p.x); 
                let allYs = tracePoints.map(p => p.y);
                let minX = Math.min(...allXs) - 5; 
                let maxX = Math.max(...allXs) + 5;
                let minY = Math.min(...allYs) - 5; 
                let maxY = Math.max(...allYs) + 5;
                
                let boxWidth = maxX - minX; 
                let boxHeight = maxY - minY;
                
                card3D.style.width = `${boxWidth}px`; 
                card3D.style.height = `${boxHeight}px`;
                card3D.style.left = `${minX}px`; 
                card3D.style.top = `${minY}px`;
                
                let pct0_x = ((corners[0].x - minX) / boxWidth) * 100; let pct0_y = ((corners[0].y - minY) / boxHeight) * 100;
                let pct1_x = ((corners[1].x - minX) / boxWidth) * 100; let pct1_y = ((corners[1].y - minY) / boxHeight) * 100;
                let pct2_x = ((corners[2].x - minX) / boxWidth) * 100; let pct2_y = ((corners[2].y - minY) / boxHeight) * 100;
                let pct3_x = ((corners[3].x - minX) / boxWidth) * 100; let pct3_y = ((corners[3].y - minY) / boxHeight) * 100;
                const clipPathString = `polygon(${pct0_x}% ${pct0_y}%, ${pct1_x}% ${pct1_y}%, ${pct2_x}% ${pct2_y}%, ${pct3_x}% ${pct3_y}%)`;
                
                const clipContainers = card3D.querySelectorAll('.clip-container');
                clipContainers.forEach(container => { container.style.clipPath = clipPathString; });
                
                const fCanvasBack = card3D.querySelector('.card-back .frame-canvas');
                const fCanvasFront = card3D.querySelector('.card-front .frame-canvas');

                fCanvasBack.width = boxWidth; fCanvasBack.height = boxHeight;
                const fCtxBack = fCanvasBack.getContext('2d');
                fCtxBack.strokeStyle = '#1a1a1a'; fCtxBack.lineWidth = 4; fCtxBack.lineCap = 'round'; fCtxBack.lineJoin = 'round';
                fCtxBack.beginPath();
                tracePoints.forEach((p, i) => {
                    if (i === 0) fCtxBack.moveTo(p.x - minX, p.y - minY);
                    else fCtxBack.lineTo(p.x - minX, p.y - minY);
                });
                fCtxBack.stroke();

                fCanvasFront.width = boxWidth; fCanvasFront.height = boxHeight;
                const fCtxFront = fCanvasFront.getContext('2d');
                fCtxFront.translate(boxWidth, 0); 
                fCtxFront.scale(-1, 1);           
                fCtxFront.strokeStyle = '#1a1a1a'; fCtxFront.lineWidth = 4; fCtxFront.lineCap = 'round'; fCtxFront.lineJoin = 'round';
                fCtxFront.beginPath();
                tracePoints.forEach((p, i) => {
                    if (i === 0) fCtxFront.moveTo(p.x - minX, p.y - minY);
                    else fCtxFront.lineTo(p.x - minX, p.y - minY);
                });
                fCtxFront.stroke();

                if (savedCanvasState) {
                    ctx.putImageData(savedCanvasState, 0, 0);
                }

                card3D.style.zIndex = '30'; 
                card3D.style.display = 'block';

                setTimeout(() => {
                    statusText.innerText = "🔮 Spatial anomaly detected, forming card back...";
                    clipContainers.forEach(container => container.classList.add('reveal'));
                }, 300);

                setTimeout(() => {
                    magicState = 2;
                    statusText.innerText = "🃏 A miracle is born! Tap to cast the spell...";
                    statusText.classList.add('pulse-hint');
                    stageWrapper.classList.add('ready-to-click'); 
                }, 3500);
            }
            else if (magicState === 2) {
                magicState = 3; 
                statusText.classList.remove('pulse-hint');
                stageWrapper.classList.remove('ready-to-click');
                statusText.innerText = "✨ Revealing your magic card...";
                card3D.style.transform = `rotateY(180deg)`;

                setTimeout(() => {
                    magicState = 4;
                    statusText.innerText = "🎨 Magic is complete! Try again for a challenge.";
                    // 魔術表演結束，顯示 Try Again 按鈕
                    btnAgain.style.display = 'block';
                }, 1500);
            }
        });

        btnAgain.addEventListener('click', (e) => {
            e.stopPropagation();

            // 1. 計算下一個數字：原本數值加 5，若大於 13 則減 13
            let currentNum = getCardValueNumber(currentValString);
            let nextNum = currentNum + 5;
            if (nextNum > 13) {
                nextNum -= 13;
            }
            currentValString = getCardValueName(nextNum);

            // 2. 計算下一個花色：紅心 -> 黑桃 -> 方塊 -> 梅花 -> 紅心
            let currentSuitIdx = suitOrder.indexOf(currentSuit);
            if (currentSuitIdx === -1) currentSuitIdx = 0; // 防止例外防呆
            let nextSuitIdx = (currentSuitIdx + 1) % 4;
            currentSuit = suitOrder[nextSuitIdx];

            // 3. 同步新卡片圖案到前端
            syncFrontImage();

            // 4. 重置畫布狀態與 3D 物件
            magicState = -1;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            card3D.style.transform = 'rotateY(0deg)';
            card3D.style.display = 'none';
            
            const clipContainers = card3D.querySelectorAll('.clip-container');
            clipContainers.forEach(container => container.classList.remove('reveal'));

            // 5. 復原 UI 控制元件
            btnAgain.style.display = 'none';
            actionButtons.style.display = 'flex';
            statusText.innerText = "✏️ Please draw a magician";
        });
    </script>
</body>
</html>
