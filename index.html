<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cardtoon - 劇場全螢幕魔術舞台 (修復版)</title>
    <style>
        body { 
            margin: 0; 
            background-image: url('./image_6.png'); 
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.35); 
            background-blend-mode: multiply;
            
            /* 舞台基礎配置 */
            width: 100vw; height: 100vh;
            position: relative; /* 鎖定 Body 坐標系統，供內部絕對定位使用 */
            overflow: hidden; /* 動畫期間防止觀眾捲動 */

            font-family: sans-serif; color: #fff;
            user-select: none;
            overscroll-behavior: none;
            
            /* 初始位置在極左側之外 (updated for safer start) */
            background-position: -200% center; 
        }

        /* ------------------------------------------ */
        /* --- 🌟 📱 直立手機 (Portrait Mobile) 劇場動態核心 🌟 --- */
        @media (max-width: 500px) and (orientation: portrait) {
            body {
                /* 1. 🔍 修正：高度填滿，確保寬度自動縮放， preserve visibility of right easel */
                background-size: auto 100%;
            }
            body.started {
                /* 劇場背景滑入動畫启动 */
                animation: stickmanEnterMobileFull 3.0s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            }
            @keyframes stickmanEnterMobileFull {
                from { background-position: -200% center; } /* 由極左滑入 */
                /* 2. ✅ 修正：停靠位置優化。火柴人靠左，並露出背景圖右側的裝飾畫架 */
                to { background-position: -10% center; } 
            }
            
            /* 畫架與引導台詞的獨立容器 */
            #magic-setup { 
                /* 3. ✅ 核心修正：改用絕對定位在螢幕中央。不參與 Body Flexbox 佈局，防止背景瞬间跳動 */
                position: absolute;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%); /* 絕對居中 */
                display: flex; flex-direction: column; align-items: center; 
                opacity: 0; 
                width: 100%;
                max-width: 95vw; /* 覆蓋大部螢幕，超好畫 */
                margin-left: 0; /* 移除 flex  margins */
            }

            /* 🎬 啟動後：互動大畫架由下往上冒出來並覆蓋畫面 */
            body.started #magic-setup {
                animation: easelUpFullMobile 2.4s cubic-bezier(0.175, 0.885, 0.32, 1.05) 1.5s forwards;
            }
            @keyframes easelUpFullMobile {
                from { 
                    /* 幾何縮小，從螢幕下方視界之外開始 */
                    transform: translate(-50%, calc(-50% + 100vh)) scale(0.6); 
                    opacity: 0; 
                }
                to { 
                    /* 幾何回歸正常，覆蓋螢幕中央作畫區域 */
                    transform: translate(-50%, -50%) scale(1.0); 
                    opacity: 1; 
                }
            }

            #status-text { 
                text-align: center; margin: 0 0 20px 0; color: #f3c623; 
                font-size: 22px; font-weight: bold; width: 300px;
                text-shadow: 0 2px 10px rgba(0,0,0,1); line-height: 1.3;
                opacity: 0;
            }
            body.started #status-text {
                animation: fadeInText 0.5s ease 3.9s forwards;
            }
            @keyframes fadeInText { to { opacity: 1; } }

            /* 畫架木質組件配合全螢幕調整 */
            #magic-stage { 
                width: 360px; height: 440px; 
                max-width: 100%;
                max-height: 60vh; /* 確保在細長手機上能完整顯示 */
            }
            #magic-stage-wrapper::after { width: calc(100% + 40px); left: -20px;}
        }

        /* --- 💻 電腦版 / 橫螢幕 (Landscape) 開場設定 (保持原樣，不影響修正) --- */
        @media (min-width: 501px), (orientation: landscape) {
            body { background-size: contain; background-position: -150% center;}
            body.started { animation: stickmanEnterDesktop 3.0s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
            @keyframes stickmanEnterDesktop {
                from { background-position: -150% center; }
                to { background-position: 25% center; }
            }
            #magic-setup {
                position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
                display: flex; flex-direction: column; align-items: center; 
                margin-left: 180px; opacity: 0;
            }
            body.started #magic-setup { animation: easelUpDesktop 2.4s cubic-bezier(0.175, 0.885, 0.32, 1.05) 1.5s forwards; }
            @keyframes easelUpDesktop {
                from { transform: translate(-50%, calc(-50% + 100vh)) scale(0.6); opacity: 0; }
                to { transform: translate(-50%, -50%) scale(1.0); opacity: 1; }
            }
            #status-text { width: 400px; font-size: 20px; }
        }

        /* ------------------------------------------ */
        /* 以下保持之前開發的功能，包含黑幕與魔術師按鈕 */
        
        /* Tap to Start 黑幕 */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #111111; display: flex; justify-content: center; align-items: center;
            z-index: 9999; cursor: pointer; transition: opacity 0.6s ease-in-out;
        }
        #start-prompt {
            font-size: 32px; color: #f3c623; font-weight: bold; letter-spacing: 2px;
            animation: textPulse 1.5s infinite alternate;
        }
        .pulse-hint { animation: textPulse 1.5s infinite alternate; }
        @keyframes textPulse {
            from { text-shadow: 0 2px 8px rgba(243, 198, 35, 0.3); transform: scale(0.98); }
            to { text-shadow: 0 2px 25px rgba(243, 198, 35, 1); color: #fff; transform: scale(1.02); }
        }

        /* 畫架與畫布元件 */
        #magic-stage-wrapper { position: relative; padding-bottom: 40px; width: 100%; display: flex; justify-content: center; }
        #magic-stage-wrapper::before { content: ""; position: absolute; bottom: -120px; left: 50%; width: 14px; height: 160px; background: #73421A; transform: translateX(-50%); z-index: 1; border-radius: 4px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        #magic-stage { position: relative; background: #fafafa; border-radius: 6px; box-shadow: 0 30px 70px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.02); border: 1px solid #e0e0e0; perspective: 1500px; z-index: 3; width: 360px; height: 440px;}
        #magic-stage-wrapper::after { content: ""; position: absolute; bottom: 30px; background: #8C5323; border-radius: 4px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); z-index: 4; border-bottom: 3px solid #592E0F; height: 16px; }

        #paintCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; background: transparent; cursor: crosshair; touch-action: none; border-radius: 6px; }
        #magic-stage-wrapper.ready-to-click { cursor: pointer; }
        
        #magic-card-3d { position: absolute; z-index: 15; transform-style: preserve-3d; display: none; transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: center center; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }
        .card-back { z-index: 2; }
        .card-front { z-index: 1; transform: rotateY(180deg); }
        .clip-container { width: 100%; height: 100%; overflow: hidden; transform: scale(0.9); transform-origin: center center; background: #fafafa; border-radius: 10px; opacity: 0; transition: opacity 3.0s ease-in-out; }
        .clip-container.reveal { opacity: 1; }
        .frame-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 2.0s ease-in-out; }
        .frame-canvas.show { opacity: 1; }
        .card-img { width: 100%; height: 100%; object-fit: fill; mix-blend-mode: multiply; filter: contrast(1.05) brightness(1.0); }

        /* 🧙‍♂️ 魔術師雙擊秘密按鈕（右下角） */
        #secret-trigger {
            position: fixed;
            bottom: 0; right: 0;
            width: 100px; height: 100px;
            background: transparent;
            z-index: 10000; 
            cursor: default;
            -webkit-tap-highlight-color: transparent;
        }

        #secret-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(25, 25, 25, 0.98);
            border: 2px solid #f3c623; border-radius: 12px;
            padding: 25px; z-index: 10001;
            display: none; color: white; font-family: sans-serif;
            box-shadow: 0 0 40px rgba(0,0,0,1); text-align: center;
        }
        #secret-modal h3 { margin-top: 0; color: #f3c623; font-size: 18px; }
        #secret-modal select, #secret-modal button {
            padding: 10px; font-size: 16px; margin: 8px; border-radius: 6px; border: 1px solid #444; background: #333; color: white;
        }
        #secret-confirm { background: #f3c623 !important; color: black !important; font-weight: bold; cursor: pointer; width: 120px; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div id="start-prompt">Tap to Start.</div>
    </div>

    <div id="magic-setup">
        <h3 id="status-text">✏️ 請在畫架上畫出一個撲克牌框...</h3>
        <div id="magic-stage-wrapper">
            <div id="magic-stage">
                <canvas id="paintCanvas" width="360" height="440"></canvas>
                <div id="magic-card-3d">
                    <div class="card-face card-back"><div class="clip-container"><img class="card-img" src="./cards/bicycle_blue.png" alt="back"></div><canvas class="frame-canvas"></canvas></div>
                    <div class="card-face card-front"><div class="clip-container"><img id="img-front" class="card-img" src="" alt="front"></div><canvas class="frame-canvas"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <div id="secret-trigger"></div>

    <div id="secret-modal">
        <h3>🧙‍♂️ 心靈控制：設定目標撲克牌</h3>
        <div style="margin: 15px 0;">
            <select id="secret-suit">
                <option value="spade">黑桃 ♠</option>
                <option value="heart">紅心 ♥</option>
                <option value="club">梅花 ♣</option>
                <option value="diamond">方塊 ♦</option>
            </select>
            <select id="secret-value">
                <option value="1">A</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="jack">J</option>
                <option value="queen">Q</option>
                <option value="king">K</option>
            </select>
        </div>
        <button id="secret-confirm">悄悄灌錄魔法</button>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const card3D = document.getElementById('magic-card-3d');
        const imgFront = document.getElementById('img-front');
        const stageWrapper = document.getElementById('magic-stage-wrapper');
        const startOverlay = document.getElementById('start-overlay');

        const secretTrigger = document.getElementById('secret-trigger');
        const secretModal = document.getElementById('secret-modal');
        const secretConfirm = document.getElementById('secret-confirm');
        const secretSuit = document.getElementById('secret-suit');
        const secretValue = document.getElementById('secret-value');

        let isDrawing = false;
        let tracePoints = []; 
        let magicState = 0; 

        // 預設隨機牌
        const availableCards = ['spade_1', 'heart_10', 'club_jack', 'diamond_king'];
        let finalCardName = availableCards[Math.floor(Math.random() * availableCards.length)];
        imgFront.src = `./cards/${finalCardName}.png`;

        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        // 點擊黑幕開場
        startOverlay.addEventListener('click', () => {
            document.body.classList.add('started');
            startOverlay.style.opacity = '0';
            setTimeout(() => { startOverlay.style.display = 'none'; }, 600);
        });

        // 🧙‍♂️ 魔術師專用：雙擊（Double Tap）快速偵測
        let lastTapTime = 0;
        secretTrigger.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const currentTime = Date.now();
            const tapLength = currentTime - lastTapTime;
            if (tapLength < 300 && tapLength > 0) {
                secretModal.style.display = 'block';
            }
            lastTapTime = currentTime;
        });

        // 儲存設定
        secretConfirm.addEventListener('click', (e) => {
            e.stopPropagation();
            finalCardName = `${secretSuit.value}_${secretValue.value}`;
            imgFront.src = `./cards/${finalCardName}.png`; 
            secretModal.style.display = 'none';
        });

        // 🎨 全設備通用指針繪畫引擎 (配合全螢幕修正 Canvas 坐標捕捉)
        canvas.addEventListener('pointerdown', (e) => { 
            if(magicState !== 0) return;
            isDrawing = true; tracePoints = []; 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            e.preventDefault(); 
        });

        canvas.addEventListener('pointermove', draw);

        function draw(e) {
            if (!isDrawing || magicState !== 0) return;
            const rect = canvas.getBoundingClientRect();
            // ✅ 核心修正：Canvas 坐標必須考慮 CSS Scale 導致的縮放比
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            
            tracePoints.push({x, y});
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            e.preventDefault();
        }

        window.addEventListener('pointerup', () => { 
            if (!isDrawing) return;
            isDrawing = false; 
            if (tracePoints.length > 10) {
                magicState = 1;
                statusText.innerText = "👉 畫得很好！現在請點擊畫布施展魔法...";
                statusText.classList.add('pulse-hint');
                stageWrapper.classList.add('ready-to-click');
            }
        });

        function getSortedCorners(pts) {
            let tl = pts[0], tr = pts[0], br = pts[0], bl = pts[0];
            let minSum = Infinity, maxSum = -Infinity, minDiff = Infinity, maxDiff = -Infinity;
            pts.forEach(p => {
                let sum = p.x + p.y, diff = p.x - p.y;
                if (sum < minSum) { minSum = sum; tl = p; }   
                if (sum > maxSum) { maxSum = sum; br = p; }   
                if (diff > maxDiff) { maxDiff = diff; tr = p; } 
                if (diff < minDiff) { minDiff = diff; bl = p; } 
            });
            return [tl, tr, br, bl];
        }

        // 🔮 點擊互動與魔法變形
        stageWrapper.addEventListener('click', (e) => {
            e.stopPropagation();

            if (magicState === 1) {
                magicState = 3; 
                statusText.classList.remove('pulse-hint');
                stageWrapper.classList.remove('ready-to-click'); 
                statusText.innerText = "⏳ 正在將粒子修正為直線...";

                // Canvas 尺寸 (邏輯尺寸)
                const logicW = canvas.width;
                const logicH = canvas.height;

                const corners = getSortedCorners(tracePoints);
                
                // 找出幾何形狀在 Canvas 中的邏輯外框
                let xs = corners.map(p => p.x); let ys = corners.map(p => p.y);
                let minX = Math.min(...xs), maxX = Math.max(...xs);
                let minY = Math.min(...ys), maxY = Math.max(...ys);
                let logicBoxW = maxX - minX; let logicBoxH = maxY - minY;

                // 🌟 核心修正：考慮剪裁容器自身的 CSS Scale (0.9)
                // 撲克牌容器在畫布中央顯示，其 CSS 尺寸應與 Canvas 邏輯尺寸同步，
                // 但內部需考慮剪裁的安全留白。
                card3D.style.width = `${logicW}px`; 
                card3D.style.height = `${logicH}px`;
                card3D.style.left = `0px`; // 滿版 Canvas
                card3D.style.top = `0px`;

                // ✅ 核心修正：計算 Clip Path 百分比，必須完全基於 Canvas 的邏輯尺寸，不被 CSS Scale 影響
                let pct0_x = (corners[0].x / logicW) * 100; let pct0_y = (corners[0].y / logicH) * 100;
                let pct1_x = (corners[1].x / logicW) * 100; let pct1_y = (corners[1].y / logicH) * 100;
                let pct2_x = (corners[2].x / logicW) * 100; let pct2_y = (corners[2].y / logicH) * 100;
                let pct3_x = (corners[3].x / logicW) * 100; let pct3_y = (corners[3].y / logicH) * 100;
                
                const clipPathString = `polygon(${pct0_x}% ${pct0_y}%, ${pct1_x}% ${pct1_y}%, ${pct2_x}% ${pct2_y}%, ${pct3_x}% ${pct3_y}%)`;
                
                const clipContainers = card3D.querySelectorAll('.clip-container');
                clipContainers.forEach(container => { container.style.clipPath = clipPathString; });
                
                // 繪製黑框在 full canvas 上
                const frameCanvases = card3D.querySelectorAll('.frame-canvas');
                frameCanvases.forEach(fCanvas => {
                    fCanvas.width = logicW; fCanvas.height = logicH;
                    const fCtx = fCanvas.getContext('2d');
                    fCtx.strokeStyle = '#1a1a1a'; fCtx.lineWidth = 4; fCtx.lineCap = 'round'; fCtx.lineJoin = 'round';
                    fCtx.beginPath();
                    fCtx.moveTo(corners[0].x, corners[0].y);
                    fCtx.lineTo(corners[1].x, corners[1].y);
                    fCtx.lineTo(corners[2].x, corners[2].y);
                    fCtx.lineTo(corners[3].x, corners[3].y);
                    fCtx.closePath(); fCtx.stroke();
                });

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                card3D.style.display = 'block';
                frameCanvases.forEach(fCanvas => fCanvas.classList.add('show'));

                setTimeout(() => {
                    statusText.innerText = "🔮 偵測到時空波動，牌背正在凝聚...";
                    clipContainers.forEach(container => container.classList.add('reveal'));
                }, 300);

                setTimeout(() => {
                    magicState = 2;
                    statusText.innerText = "🃏 奇蹟誕生！點擊撲克牌將它翻面...";
                    statusText.classList.add('pulse-hint');
                    stageWrapper.classList.add('ready-to-click'); 
                }, 3500);
            }
            else if (magicState === 2) {
                magicState = 3; 
                statusText.classList.remove('pulse-hint');
                stageWrapper.classList.remove('ready-to-click');
                statusText.innerText = "✨ 正在揭曉你的神奇卡牌...";
                card3D.style.transform = `rotateY(180deg)`;
            }
        });
    </script>
</body>
</html>
