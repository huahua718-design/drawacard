<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Cardtoon - 魔法撲克牌</title>
    <style>
        /* 🔒 基礎防護：關閉全域原生手勢干擾 */
        html, body { touch-action: none; -webkit-text-size-adjust: none; }
        
        body { 
            margin: 0; background-image: url('./image_6.png'); background-size: 80%;
            background-repeat: no-repeat; background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.35); background-blend-mode: multiply;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; font-family: sans-serif; color: #fff;
            user-select: none; -webkit-user-select: none; overscroll-behavior: none;
            background-position: -50% center; 
        }

        body.started { animation: stickmanEnter 3.0s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes stickmanEnter { from { background-position: -50% center; } to { background-position: 25% center; } }
        
        #magic-setup { display: flex; flex-direction: column; align-items: center; margin-left: 180px; opacity: 0; }
        body.started #magic-setup { animation: easelUp 2.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) 1.2s forwards; }
        @keyframes easelUp { from { transform: translateY(100vh); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        #status-text { text-align: center; margin: 0 0 30px 0; color: #f3c623; font-size: 20px; font-weight: bold; text-shadow: 0 2px 8px rgba(0,0,0,0.9); width: 500px; line-height: 1.5; opacity: 0; }
        body.started #status-text { animation: fadeInText 0.5s ease 3.6s forwards; }
        @keyframes fadeInText { to { opacity: 1; } }

        /* 📱 手機版面微調 */
        @media (max-width: 500px) and (orientation: portrait) {
            body { background-size: 110%; }
            body.started { animation: stickmanEnterMobile 3.0s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
            @keyframes stickmanEnterMobile { from { background-position: -150% center; } to { background-position: -25% center; } }
            #magic-setup { margin-left: 0; position: absolute; right: 8px; transform: scale(0.52); transform-origin: right center; }
            #status-text { width: 320px; font-size: 26px; margin-bottom: 15px; }
        }

        #start-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111111; display: flex; justify-content: center; align-items: center; z-index: 9999; cursor: pointer; transition: opacity 0.6s ease-in-out; touch-action: none; }
        #start-prompt { font-size: 32px; color: #f3c623; font-weight: bold; letter-spacing: 2px; animation: textPulse 1.5s infinite alternate; }
        .pulse-hint { animation: textPulse 1.5s infinite alternate; }
        @keyframes textPulse { from { text-shadow: 0 2px 8px rgba(243, 198, 35, 0.3); transform: scale(0.98); } to { text-shadow: 0 2px 25px rgba(243, 198, 35, 1); color: #fff; transform: scale(1.02); } }

        #magic-stage-wrapper { position: relative; padding-bottom: 40px; }
        #magic-stage-wrapper::before { content: ""; position: absolute; bottom: -120px; left: 50%; width: 14px; height: 160px; background: #73421A; transform: translateX(-50%); z-index: 1; border-radius: 4px; box-shadow: 5px 5px 15px rgba(0,0,0,0.5); }
        #magic-stage { position: relative; width: 360px; height: 440px; background: #fafafa; border-radius: 6px; box-shadow: 0 30px 70px rgba(0,0,0,0.8), inset 0 0 30px rgba(0,0,0,0.02); border: 1px solid #e0e0e0; perspective: 1500px; z-index: 3; }
        #magic-stage-wrapper::after { content: ""; position: absolute; bottom: 30px; left: -20px; width: 400px; height: 16px; background: #8C5323; border-radius: 4px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); z-index: 4; border-bottom: 3px solid #592E0F; }

        /* 🔒 關鍵：讓畫布專注於接收繪圖觸控，不受全域攔截影響 */
        #paintCanvas { position: absolute; top: 0; left: 0; z-index: 20; background: transparent; cursor: crosshair; touch-action: none; }
        #magic-stage-wrapper.ready-to-click { cursor: pointer; }
        
        #magic-card-3d { position: absolute; z-index: 15; transform-style: preserve-3d; display: none; transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); transform-origin: center center; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }
        .card-back { z-index: 2; }
        .card-front { z-index: 1; transform: rotateY(180deg); }
        .clip-container { width: 100%; height: 100%; overflow: hidden; transform: scale(0.9); transform-origin: center center; background: #fafafa; border-radius: 10px; opacity: 0; transition: opacity 3.0s ease-in-out; }
        .clip-container.reveal { opacity: 1; }
        .frame-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; opacity: 0; transition: opacity 2.0s ease-in-out; }
        .frame-canvas.show { opacity: 1; }
        
        /* 卡牌縮小 90% 避免邊緣被筆跡蓋住 */
        .card-img { width: 100%; height: 100%; object-fit: fill; mix-blend-mode: multiply; filter: contrast(1.05) brightness(1.0); transform: scale(0.9); transform-origin: center center; }
        
        #secret-trigger { position: fixed; bottom: 0; right: 0; width: 90px; height: 90px; background: transparent; z-index: 10000; cursor: default; -webkit-tap-highlight-color: transparent; touch-action: none; }
        #secret-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(25, 25, 25, 0.98); border: 2px solid #f3c623; border-radius: 12px; padding: 25px; z-index: 10001; display: none; color: white; font-family: sans-serif; box-shadow: 0 0 40px rgba(0,0,0,1); text-align: center; }
        #secret-modal h3 { margin-top: 0; color: #f3c623; font-size: 18px; }
        #secret-modal select, #secret-modal button { padding: 10px; font-size: 16px; margin: 8px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; }
        #secret-confirm { background: #f3c623 !important; color: black !important; font-weight: bold; cursor: pointer; width: 120px; }
    </style>
</head>
<body>

    <div id="start-overlay"><div id="start-prompt">Tap to Start.</div></div>

    <div id="magic-setup">
        <h3 id="status-text">✏️ 請用鉛筆在木畫架上，一筆畫出一個撲克牌框...</h3>
        <div id="magic-stage-wrapper">
            <div id="magic-stage">
                <canvas id="paintCanvas" width="360" height="440"></canvas>
                <div id="magic-card-3d">
                    <div class="card-face card-back"><div class="clip-container"><img class="card-img" src="./cards/bicycle_blue.png" alt="back"></div><canvas class="frame-canvas"></canvas></div>
                    <div class="card-face card-front"><div class="clip-container"><img id="img-front" class="card-img" src="" alt="front"></div><canvas class="frame-canvas"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <div id="secret-trigger"></div>
    <div id="secret-modal">
        <h3>🧙‍♂️ 心靈控制：設定目標撲克牌</h3>
        <div style="margin: 15px 0;">
            <select id="secret-suit">
                <option value="spade">黑桃 ♠</option>
                <option value="heart">紅心 ♥</option>
                <option value="club">梅花 ♣</option>
                <option value="diamond">方塊 ♦</option>
            </select>
            <select id="secret-value">
                <option value="1">A</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                <option value="10">10</option><option value="jack">J</option><option value="queen">Q</option><option value="king">K</option>
            </select>
        </div>
        <button id="secret-confirm">悄悄灌錄魔法</button>
    </div>

    <script>
        // 🔒 全域雙指縮放防護 (僅限多點觸控)
        document.addEventListener('touchstart', (e) => { 
            if (e.touches.length > 1) e.preventDefault(); 
        }, { passive: false });

        // 🔒 阻擋雙擊放大 (避開 secret-modal 以免按鈕失效)
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                if (!event.target.closest('#secret-modal') && event.target.id !== 'paintCanvas') {
                    event.preventDefault(); 
                }
            }
            lastTouchEnd = now;
        }, { passive: false });
        
        // 🔮 核心邏輯：自動計算日期對應撲克牌
        const now = new Date();
        const month = now.getMonth() + 1; // 數字 = 當日月份
        const date = now.getDate();       // 花色 = 當日日期除以四的餘數
        const remainder = date % 4;
        let suit = (remainder === 1) ? "club" : (remainder === 2) ? "diamond" : (remainder === 3) ? "heart" : "spade";
        
        let finalCardName = `${suit}_${month}`; // 例如: diamond_6
        const imgFront = document.getElementById('img-front');
        imgFront.src = `./cards/${finalCardName}.png`; // 自動載入對應牌面

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        const card3D = document.getElementById('magic-card-3d');
        const stageWrapper = document.getElementById('magic-stage-wrapper');
        const startOverlay = document.getElementById('start-overlay');
        const secretTrigger = document.getElementById('secret-trigger');
        const secretModal = document.getElementById('secret-modal');
        const secretConfirm = document.getElementById('secret-confirm');
        const secretSuit = document.getElementById('secret-suit');
        const secretValue = document.getElementById('secret-value');

        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        // 🎬 點擊 Tap to Start 開場
        startOverlay.addEventListener('touchstart', (e) => {
            e.preventDefault();
            document.body.classList.add('started');
            startOverlay.style.opacity = '0';
            setTimeout(() => { startOverlay.style.display = 'none'; }, 600);
        }, { passive: false });

        // 🧙‍♂️ 魔術師極速雙擊觸發器
        let lastTapTime = 0;
        secretTrigger.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            const currentTime = Date.now();
            if (currentTime - lastTapTime < 300 && currentTime - lastTapTime > 0) {
                secretModal.style.display = 'block';
            }
            lastTapTime = currentTime;
        }, { passive: false });

        // 手動覆寫設定
        secretConfirm.addEventListener('click', (e) => {
            e.stopPropagation();
            finalCardName = `${secretSuit.value}_${secretValue.value}`;
            imgFront.src = `./cards/${finalCardName}.png`; 
            secretModal.style.display = 'none';
        });

        // 🎨 繪畫引擎
        let isDrawing = false;
        let tracePoints = []; 
        let magicState = 0;

        canvas.addEventListener('pointerdown', (e) => { 
            if(magicState !== 0) return;
            isDrawing = true; tracePoints = []; 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing || magicState !== 0) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            tracePoints.push({x, y});
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        });

        window.addEventListener('pointerup', () => { 
            if (!isDrawing) return;
            isDrawing = false; 
            if (tracePoints.length > 10) {
                magicState = 1;
                statusText.innerText = "👉 畫得很好！現在請用手指「點擊畫布施展魔法」...";
                statusText.classList.add('pulse-hint');
                stageWrapper.classList.add('ready-to-click');
            }
        });

        // 找出四個頂點
        function getSortedCorners(pts) {
            let tl = pts[0], tr = pts[0], br = pts[0], bl = pts[0];
            let minSum = Infinity, maxSum = -Infinity, minDiff = Infinity, maxDiff = -Infinity;
            pts.forEach(p => {
                let sum = p.x + p.y, diff = p.x - p.y;
                if (sum < minSum) { minSum = sum; tl = p; }   
                if (sum > maxSum) { maxSum = sum; br = p; }   
                if (diff > maxDiff) { maxDiff = diff; tr = p; } 
                if (diff < minDiff) { minDiff = diff; bl = p; } 
            });
            return [tl, tr, br, bl];
        }

        // 🪄 點擊互動與魔法變形
        stageWrapper.addEventListener('click', (e) => {
            e.stopPropagation();

            if (magicState === 1) {
                magicState = 3; 
                statusText.classList.remove('pulse-hint');
                stageWrapper.classList.remove('ready-to-click'); 
                statusText.innerText = "⏳ 魔法正在注入你的手繪圖騰...";

                const corners = getSortedCorners(tracePoints);
                let allXs = tracePoints.map(p => p.x); 
                let allYs = tracePoints.map(p => p.y);
                let minX = Math.min(...allXs) - 5; 
                let maxX = Math.max(...allXs) + 5;
                let minY = Math.min(...allYs) - 5; 
                let maxY = Math.max(...allYs) + 5;
                
                let boxWidth = maxX - minX; 
                let boxHeight = maxY - minY;
                
                card3D.style.width = `${boxWidth}px`; 
                card3D.style.height = `${boxHeight}px`;
                card3D.style.left = `${minX}px`; 
                card3D.style.top = `${minY}px`;
                
                let pct0_x = ((corners[0].x - minX) / boxWidth) * 100; let pct0_y = ((corners[0].y - minY) / boxHeight) * 100;
                let pct1_x = ((corners[1].x - minX) / boxWidth) * 100; let pct1_y = ((corners[1].y - minY) / boxHeight) * 100;
                let pct2_x = ((corners[2].x - minX) / boxWidth) * 100; let pct2_y = ((corners[2].y - minY) / boxHeight) * 100;
                let pct3_x = ((corners[3].x - minX) / boxWidth) * 100; let pct3_y = ((corners[3].y - minY) / boxHeight) * 100;
                const clipPathString = `polygon(${pct0_x}% ${pct0_y}%, ${pct1_x}% ${pct1_y}%, ${pct2_x}% ${pct2_y}%, ${pct3_x}% ${pct3_y}%)`;
                
                const clipContainers = card3D.querySelectorAll('.clip-container');
                clipContainers.forEach(container => { container.style.clipPath = clipPathString; });
                
                const frameCanvases = card3D.querySelectorAll('.frame-canvas');
                frameCanvases.forEach(fCanvas => {
                    fCanvas.width = boxWidth; fCanvas.height = boxHeight;
                    const fCtx = fCanvas.getContext('2d');
                    fCtx.drawImage(canvas, minX, minY, boxWidth, boxHeight, 0, 0, boxWidth, boxHeight);
                });

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                card3D.style.display = 'block';
                frameCanvases.forEach(fCanvas => fCanvas.classList.add('show'));

                setTimeout(() => {
                    statusText.innerText = "🔮 偵測到時空波動，牌背正在凝聚...";
                    clipContainers.forEach(container => container.classList.add('reveal'));
                }, 300);

                setTimeout(() => {
                    magicState = 2;
                    statusText.innerText = "🃏 奇蹟誕生！用手指「點擊撲克牌」將它翻面...";
                    statusText.classList.add('pulse-hint');
                    stageWrapper.classList.add('ready-to-click'); 
                }, 3500);
            }
            else if (magicState === 2) {
                magicState = 3; 
                statusText.classList.remove('pulse-hint');
                stageWrapper.classList.remove('ready-to-click');
                statusText.innerText = "✨ 正在揭曉你的神奇卡牌...";
                card3D.style.transform = `rotateY(180deg)`;
            }
        });
    </script>
</body>
</html>
