<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Cardtoon - 魔法撲克牌</title>
    <style>
        /* 鎖定手勢，但開放畫筆觸控 */
        html, body { touch-action: none; -webkit-text-size-adjust: none; overflow: hidden; }
        body { 
            margin: 0; background-image: url('./image_6.png'); background-size: 80%;
            background-repeat: no-repeat; background-attachment: fixed;
            background-color: rgba(0, 0, 0, 0.35); background-blend-mode: multiply;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; font-family: sans-serif; color: #fff;
            user-select: none; -webkit-user-select: none; overscroll-behavior: none;
            background-position: -50% center; 
        }

        /* 畫架與畫布層級修正 */
        #magic-stage { 
            position: relative; width: 360px; height: 440px; background: #fafafa; border-radius: 6px; 
            box-shadow: 0 30px 70px rgba(0,0,0,0.8); perspective: 1500px; 
            z-index: 10; /* 確保畫架高於背景 */
        }
        
        /* 🎨 畫布必須是最高層，且不被點擊穿透 */
        #paintCanvas { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 100; /* 🔥 關鍵修正：畫布必須在最上層 */
            background: transparent; touch-action: none;
        }

        #magic-card-3d { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 50; /* 卡牌在畫布下方，直到動畫觸發 */
            transform-style: preserve-3d; display: none;
        }

        /* 其餘樣式保持相同 */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #111111; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .card-img { width: 100%; height: 100%; transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="start-overlay"><div id="start-prompt">Tap to Start.</div></div>

    <div id="magic-setup">
        <h3 id="status-text">✏️ 請用鉛筆在木畫架上，一筆畫出一個撲克牌框...</h3>
        <div id="magic-stage">
            <div id="magic-card-3d">
                <div class="card-face card-back"><img class="card-img" src="./cards/bicycle_blue.png"></div>
                <div class="card-face card-front"><img id="img-front" class="card-img" src=""></div>
            </div>
            <canvas id="paintCanvas" width="360" height="440"></canvas>
        </div>
    </div>

    <script>
        // 1. 初始化自動日期牌面
        const now = new Date();
        const month = now.getMonth() + 1;
        const remainder = now.getDate() % 4;
        const suits = ["spade", "club", "diamond", "heart"];
        const finalCardName = `${suits[remainder]}_${month}`;
        document.getElementById('img-front').src = `./cards/${finalCardName}.png`;

        // 2. 畫布觸控優化
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 4; ctx.lineCap = 'round';
        
        let isDrawing = false;
        
        canvas.addEventListener('pointerdown', (e) => {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        });

        canvas.addEventListener('pointerup', () => { isDrawing = false; });

        // 3. 確保啟動層順利移除
        document.getElementById('start-overlay').addEventListener('touchstart', (e) => {
            e.preventDefault();
            document.getElementById('start-overlay').style.display = 'none';
            document.body.classList.add('started');
        }, { passive: false });
    </script>
</body>
</html>
